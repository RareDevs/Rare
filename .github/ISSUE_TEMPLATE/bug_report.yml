name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.6.2
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - pip
        - AppImage
        - MSI
        - DMG
        - Package manager
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: If installed through `pip` or your package manager.
      placeholder: e.g. 3.11.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error message
      description: |
        Paste the relevant log output here. Logs can be found at:
        - **Windows**: `C:\Users\<username>\AppData\Local\Rare\Rare\cache\logs`
        - **Linux**: `/home/<username>/.cache/Rare/Rare/logs`
        - **macOS**: `/Users/<username>/Library/Caches/Rare/Rare/logs`
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
